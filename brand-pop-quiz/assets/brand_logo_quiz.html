<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brand Logo Quiz</title>
  <style>
    :root {
      --bg: #101418;
      --card: #171d24;
      --card-2: #1d252e;
      --text: #f2f5f8;
      --muted: #8f9baa;
      --accent: #7dd3fc;
      --soft: rgba(255,255,255,0.08);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(125, 211, 252, 0.09), transparent 34%),
        radial-gradient(circle at bottom right, rgba(168, 85, 247, 0.08), transparent 32%),
        var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .app {
      width: min(92vw, 820px);
      height: min(88vh, 620px);
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 18px;
      padding: 18px;
    }

    .topbar,
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--muted);
      font-size: clamp(13px, 2vw, 16px);
      user-select: none;
    }

    .pill {
      border: 1px solid var(--soft);
      background: rgba(255,255,255,0.04);
      border-radius: 999px;
      padding: 8px 13px;
      backdrop-filter: blur(10px);
    }

    .stage {
      position: relative;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 32px;
      background:
        linear-gradient(145deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02)),
        var(--card);
      box-shadow:
        0 28px 90px rgba(0,0,0,0.42),
        inset 0 1px 0 rgba(255,255,255,0.08);
      overflow: hidden;
      cursor: pointer;
      isolation: isolate;
    }

    .stage::before {
      content: "";
      position: absolute;
      inset: 18px;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.045);
      pointer-events: none;
    }

    .brand-card {
      width: min(82%, 560px);
      min-height: 260px;
      display: grid;
      place-items: center;
      padding: clamp(24px, 6vw, 54px);
      border-radius: 28px;
      background:
        radial-gradient(circle at 50% 0%, rgba(255,255,255,0.10), transparent 42%),
        var(--card-2);
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow: 0 18px 50px rgba(0,0,0,0.32);
      transform: translateY(0) scale(1);
      transition: transform 280ms ease, opacity 230ms ease, filter 280ms ease;
    }

    .brand-card.switching {
      opacity: 0;
      transform: translateY(10px) scale(0.985);
      filter: blur(7px);
    }

    .brand {
      text-align: center;
      line-height: 1;
      user-select: none;
      width: 100%;
      display: grid;
      place-items: center;
    }

    .brand-image {
      max-width: min(88%, 520px);
      max-height: 320px;
      object-fit: contain;
      border-radius: 18px;
      background: rgba(255,255,255,0.96);
      padding: 18px;
      box-shadow:
        0 12px 35px rgba(0,0,0,0.28),
        inset 0 1px 0 rgba(255,255,255,0.8);
      user-select: none;
      pointer-events: none;
    }

    .logo-mark {
      margin: 0 auto 22px;
      display: grid;
      place-items: center;
    }

    .brand-name {
      font-size: clamp(50px, 10vw, 96px);
      font-weight: 800;
      letter-spacing: -0.055em;
      white-space: nowrap;
    }

    .tagline {
      margin-top: 14px;
      color: var(--muted);
      font-size: clamp(13px, 2vw, 17px);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0.72;
    }

    .answer {
      position: absolute;
      right: 26px;
      bottom: 24px;
      color: rgba(255,255,255,0.38);
      font-size: 14px;
      letter-spacing: 0.08em;
      opacity: 0;
      transform: translateY(8px);
      transition: 220ms ease;
      pointer-events: none;
      text-transform: uppercase;
    }

    .show-answer .answer {
      opacity: 1;
      transform: translateY(0);
    }

    .hint {
      opacity: 0.85;
    }

    button {
      border: 0;
      color: var(--text);
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 999px;
      padding: 10px 15px;
      font: inherit;
      cursor: pointer;
    }

    button:active {
      transform: scale(0.98);
    }

    @media (max-width: 520px) {
      .app {
        height: 92vh;
        padding: 12px;
      }

      .topbar,
      .footer {
        gap: 8px;
        flex-wrap: wrap;
        justify-content: center;
      }

      .brand-card {
        width: 92%;
        min-height: 245px;
      }

      .brand-name {
        white-space: normal;
      }

      .mitsubishi .brand-name {
        font-size: clamp(30px, 8vw, 48px);
      }

      .answer {
        left: 0;
        right: 0;
        text-align: center;
        bottom: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="topbar">
      <div class="pill">Brand Quiz</div>
      <div class="pill"><span id="counter">1 / 8</span></div>
    </div>

    <section id="stage" class="stage" aria-label="Brand quiz card" tabindex="0">
      <div id="card" class="brand-card">
        <div id="brand" class="brand"></div>
      </div>
      <div id="answer" class="answer"></div>
    </section>

    <div class="footer">
      <div class="hint">Press <strong>Space</strong> for next</div>
      <button id="shuffleBtn" type="button">Shuffle</button>
    </div>
  </main>

  <script>
    const brands = [
      {
        name: "Samsung",
        image: "samsung.png"
      },
      {
        name: "Godrej",
        image: "godrej.jpeg"
      },
      {
        name: "Daikin",
        image: "daikin.jpg"
      },
      {
        name: "Haier",
        image: "haier.jpeg"
      },
      {
        name: "Mitsubishi",
        image: "mitsubishi-logo.jpg"
      },
      {
        name: "Lloyd",
        image: "llyod.jpeg"
      },
      {
        name: "Blue Star",
        image: "bluestar.png"
      },
      {
        name: "Panasonic",
        image: "Panasonic-logo.jpg"
      },
      {
        name: "LG",
        image: "lg-logo.png"
      }
    ];

    let order = [...brands];
    let index = 0;
    let answerVisible = false;

    const stage = document.getElementById("stage");
    const card = document.getElementById("card");
    const brandEl = document.getElementById("brand");
    const answerEl = document.getElementById("answer");
    const counterEl = document.getElementById("counter");
    const shuffleBtn = document.getElementById("shuffleBtn");

    function renderBrand() {
      const item = order[index];

      card.className = "brand-card switching";
      stage.classList.remove("show-answer");
      answerVisible = false;

      setTimeout(() => {
        brandEl.className = `brand`;
        brandEl.innerHTML = `
          <img
            src="${item.image}"
            alt="${item.name}"
            class="brand-image"
            draggable="false"
          />
        `;

        answerEl.textContent = item.name;
        counterEl.textContent = `${index + 1} / ${order.length}`;
        card.className = "brand-card";
      }, 180);
    }

    function nextBrand() {
      index = (index + 1) % order.length;
      renderBrand();
    }

    function toggleAnswer() {
      answerVisible = !answerVisible;
      stage.classList.toggle("show-answer", answerVisible);
    }

    function shuffleBrands() {
      for (let i = order.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [order[i], order[j]] = [order[j], order[i]];
      }
      index = 0;
      renderBrand();
    }

    document.addEventListener("keydown", (e) => {
      if (e.code === "Space") {
        e.preventDefault();
        nextBrand();
      }

      if (e.key.toLowerCase() === "a") {
        toggleAnswer();
      }

      if (e.key.toLowerCase() === "s") {
        shuffleBrands();
      }
    });

    stage.addEventListener("click", nextBrand);
    stage.addEventListener("touchend", (e) => {
      e.preventDefault();
      nextBrand();
    }, { passive: false });

    shuffleBtn.addEventListener("click", shuffleBrands);

    renderBrand();
  </script>
</body>
</html>
