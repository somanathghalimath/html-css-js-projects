<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#101418" />
  <title>Brand Pop Quiz</title>
  <style>
    :root {
      --bg: #101418;
      --card: #171d24;
      --card-2: #1d252e;
      --text: #f2f5f8;
      --muted: #8f9baa;
      --accent: #7dd3fc;
      --accent-2: #a855f7;
      --soft: rgba(255,255,255,0.08);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      background:
        radial-gradient(circle at top left, rgba(125, 211, 252, 0.10), transparent 36%),
        radial-gradient(circle at bottom right, rgba(168, 85, 247, 0.10), transparent 34%),
        var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      -webkit-font-smoothing: antialiased;
      display: grid;
      place-items: center;
      padding:
        env(safe-area-inset-top)
        env(safe-area-inset-right)
        env(safe-area-inset-bottom)
        env(safe-area-inset-left);
    }

    .app {
      width: min(94vw, 820px);
      height: min(94dvh, 640px);
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 16px;
      padding: 16px;
    }

    .topbar,
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: clamp(12px, 1.8vw, 15px);
      letter-spacing: 0.02em;
    }

    .pill {
      border: 1px solid var(--soft);
      background: rgba(255,255,255,0.04);
      border-radius: 999px;
      padding: 8px 14px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      white-space: nowrap;
    }
    .pill strong { color: var(--text); font-weight: 600; }

    /* ---------- Stage ---------- */
    .stage {
      position: relative;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 28px;
      background:
        linear-gradient(145deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02)),
        var(--card);
      box-shadow:
        0 28px 80px rgba(0,0,0,0.45),
        inset 0 1px 0 rgba(255,255,255,0.08);
      overflow: hidden;
      cursor: pointer;
      isolation: isolate;
      min-height: 0;
    }
    .stage::before {
      content: "";
      position: absolute;
      inset: 14px;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,0.045);
      pointer-events: none;
    }

    .brand-card {
      width: min(86%, 560px);
      max-height: 86%;
      display: grid;
      place-items: center;
      padding: clamp(18px, 4vw, 40px);
      border-radius: 24px;
      background:
        radial-gradient(circle at 50% 0%, rgba(255,255,255,0.10), transparent 42%),
        var(--card-2);
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow: 0 18px 50px rgba(0,0,0,0.32);
      transition: transform 280ms ease, opacity 230ms ease, filter 280ms ease;
    }
    .brand-card.switching {
      opacity: 0;
      transform: translateY(10px) scale(0.985);
      filter: blur(7px);
    }

    .brand {
      width: 100%;
      display: grid;
      place-items: center;
    }
    .brand-image {
      max-width: min(88%, 520px);
      max-height: min(56vh, 360px);
      object-fit: contain;
      border-radius: 16px;
      background: rgba(255,255,255,0.96);
      padding: 14px;
      box-shadow:
        0 12px 30px rgba(0,0,0,0.30),
        inset 0 1px 0 rgba(255,255,255,0.8);
      pointer-events: none;
    }

    .answer {
      position: absolute;
      right: 22px;
      bottom: 18px;
      color: rgba(255,255,255,0.40);
      font-size: 13px;
      letter-spacing: 0.12em;
      opacity: 0;
      transform: translateY(8px);
      transition: 220ms ease;
      pointer-events: none;
      text-transform: uppercase;
    }
    .show-answer .answer {
      opacity: 1;
      transform: translateY(0);
    }

    /* ---------- Footer / buttons ---------- */
    .hint {
      opacity: 0.85;
      flex: 1;
      min-width: 0;
    }
    .footer-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    button {
      color: var(--text);
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 999px;
      padding: 10px 16px;
      font: inherit;
      font-weight: 500;
      cursor: pointer;
      transition: background 140ms ease, transform 80ms ease, border-color 140ms ease;
    }
    button:hover { background: rgba(255,255,255,0.11); }
    button:active { transform: scale(0.97); }
    button.primary {
      background: rgba(125, 211, 252, 0.15);
      border-color: rgba(125, 211, 252, 0.30);
      color: #cdeefe;
    }
    button.primary:hover { background: rgba(125, 211, 252, 0.22); }

    /* ---------- Done state ---------- */
    .done {
      text-align: center;
      color: var(--text);
    }
    .done .tick {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      font-size: 28px;
      margin-bottom: 18px;
    }
    .done h1 {
      margin: 0 0 6px;
      font-size: clamp(22px, 4.4vw, 28px);
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .done p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    /* ---------- Small screens ---------- */
    @media (max-width: 520px) {
      .app { padding: 10px; gap: 12px; height: 96dvh; }
      .topbar, .footer { flex-wrap: wrap; justify-content: center; }
      .pill { padding: 7px 12px; }
      .brand-card { width: 92%; padding: 18px; }
      .brand-image { max-height: 46vh; }
      .answer { left: 0; right: 0; bottom: 14px; text-align: center; }
      .hint { display: none; }
      button { padding: 11px 16px; }
    }

    /* ---------- Landscape phones ---------- */
    @media (orientation: landscape) and (max-height: 500px) {
      .app { height: 96dvh; gap: 8px; padding: 8px; }
      .brand-card { padding: 12px; }
      .brand-image { max-height: 60vh; padding: 10px; }
      .answer { bottom: 10px; right: 14px; }
      button { padding: 8px 14px; font-size: 13px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="topbar">
      <div class="pill">Brand Pop Quiz</div>
      <div class="pill"><strong id="counter">1</strong>&nbsp;/&nbsp;<span id="total">19</span></div>
    </div>

    <section id="stage" class="stage" tabindex="0" aria-label="Quiz card">
      <div id="card" class="brand-card">
        <div id="brand" class="brand"></div>
      </div>
      <div id="answer" class="answer"></div>
    </section>

    <div class="footer">
      <div class="hint">Tap left/right or press <strong>&larr;</strong> / <strong>&rarr;</strong></div>
      <div class="footer-actions">
        <button id="revealBtn" type="button" class="primary">Reveal</button>
        <button id="shuffleBtn" type="button">Shuffle</button>
      </div>
    </div>
  </main>

    let order = items.slice();
    let index = 0;
    let answerVisible = false;
    let finished = false;

    const stage     = document.getElementById('stage');
    const card      = document.getElementById('card');
    const brandEl   = document.getElementById('brand');
    const answerEl  = document.getElementById('answer');
    const counterEl = document.getElementById('counter');
    const totalEl   = document.getElementById('total');
    const revealBtn = document.getElementById('revealBtn');
    const shuffleBtn= document.getElementById('shuffleBtn');

    function shuffleInPlace(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
      }
    }

    function render() {
      const item = order[index];
      card.className = 'brand-card switching';
      stage.classList.remove('show-answer');
      answerVisible = false;

      setTimeout(function () {
        brandEl.innerHTML = '';
        const img = document.createElement('img');
        img.src = item.src;
        img.alt = item.name;
        img.draggable = false;
        img.className = 'brand-image';
        brandEl.appendChild(img);

        answerEl.textContent = item.name;
        counterEl.textContent = index + 1;
        card.className = 'brand-card';
      }, 180);
    }

    function showFinished() {
      finished = true;
      card.className = 'brand-card switching';
      stage.classList.remove('show-answer');
      setTimeout(function () {
        brandEl.innerHTML =
          '<div class="done">' +
            '<div class="tick">&#10003;</div>' +
            '<h1>All ' + order.length + ', named.</h1>' +
            '<p>Tap Shuffle to play again.</p>' +
          '</div>';
        answerEl.textContent = '';
        counterEl.textContent = order.length;
        card.className = 'brand-card';
      }, 180);
    }

    function nextItem() {
      if (finished) { restart(); return; }
      if (index < order.length - 1) {
        index++;
        render();
      } else {
        showFinished();
      }
    }

    function prevItem() {
      if (finished) {
        finished = false;
        index = order.length - 1;
        render();
        return;
      }
      if (index > 0) {
        index--;
        render();
      }
    }

    function toggleAnswer() {
      if (finished) return;
      answerVisible = !answerVisible;
      stage.classList.toggle('show-answer', answerVisible);
    }

    function restart() {
      finished = false;
      shuffleInPlace(order);
      index = 0;
      totalEl.textContent = order.length;
      render();
    }

    document.addEventListener('keydown', function (e) {
      if (e.code === 'Space' || e.key === 'ArrowRight') { e.preventDefault(); nextItem(); }
      else if (e.key === 'ArrowLeft') { e.preventDefault(); prevItem(); }
      else if (e.key === 'a' || e.key === 'A') { toggleAnswer(); }
      else if (e.key === 's' || e.key === 'S') { restart(); }
      else if (e.key === 'r' || e.key === 'R') { restart(); }
    });

    stage.addEventListener('click', function (e) {
      const rect = stage.getBoundingClientRect();
      if (e.clientX - rect.left < rect.width / 2) {
        prevItem();
      } else {
        nextItem();
      }
    });

    revealBtn.addEventListener('click', function (e) {
      e.stopPropagation();
      toggleAnswer();
    });
    shuffleBtn.addEventListener('click', function (e) {
      e.stopPropagation();
      restart();
    });

    // First paint
    shuffleInPlace(order);
    render();
  </script>
